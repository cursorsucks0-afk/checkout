<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uber Group Order Viewer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="card">
        <h1>Group Link Viewer</h1>
        <p class="sub">Paste an Uber Eats group order link to fetch visible guest data.</p>

        <form id="viewer-form" class="form-row">
          <input
            id="group-url"
            type="url"
            placeholder="https://www.ubereats.com/group-orders/..."
            required
          />
          <button type="submit" id="load-btn">Load</button>
        </form>

        <p id="status" class="status">Waiting for a link.</p>
      </section>

      <section id="result" class="card hidden">
        <h2>Order Snapshot</h2>
        <div id="meta" class="meta"></div>
        <ul id="item-list" class="item-list"></ul>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
